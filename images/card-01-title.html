<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:800px;background:#111827;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;overflow:hidden;position:relative}
.accent-line{width:120px;height:5px;background:#10B981;border-radius:3px;margin-bottom:40px}
h1{font-size:50px;font-weight:800;text-align:center;line-height:1.2;max-width:900px;letter-spacing:-1px}
h1 span{color:#10B981}
.subtitle{font-size:22px;color:#9CA3AF;margin-top:24px;text-align:center;font-weight:400;max-width:720px;line-height:1.5}
.badge{margin-top:32px;display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);border-radius:99px;padding:10px 24px;font-size:14px;color:#6EE7B7;font-weight:600}
.brand{position:absolute;bottom:32px;right:40px;display:flex;align-items:center;gap:10px}
.brand .dot{width:12px;height:12px;background:#10B981;border-radius:50%}
.brand span{font-size:16px;font-weight:600;color:#6B7280;letter-spacing:1px;text-transform:uppercase}
.corner-tl,.corner-br{position:absolute;width:60px;height:60px;border:2px solid rgba(16,185,129,0.15)}
.corner-tl{top:24px;left:24px;border-right:0;border-bottom:0;border-radius:4px 0 0 0}
.corner-br{bottom:24px;right:24px;border-left:0;border-top:0;border-radius:0 0 4px 0}
.glow{position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(16,185,129,0.08),transparent 70%);pointer-events:none}
</style></head><body>
<div class="glow"></div>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="accent-line"></div>
<h1>The Honest Truth About<br><span>Facebook Leads</span> for<br>Home Service Businesses</h1>
<p class="subtitle">Why most contractors think Facebook ads don't work — and what the ones booking 10+ jobs a month are doing differently.</p>
<div class="badge">🎯 For HVAC, Bathroom Remodelers, Deck Builders & Roofers</div>
<div class="brand"><div class="dot"></div><span>Rambitious Media</span></div>
</body></html>
