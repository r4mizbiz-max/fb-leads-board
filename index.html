<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rambitious Boards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2332;--border:#1f2937;--green:#10B981;--red:#EF4444;--text:#f9fafb;--muted:#6b7280}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--text)}

/* === MENU SCREEN === */
#menuScreen{width:100%;height:100%;display:flex;flex-direction:column;overflow-y:auto}
#menuScreen.hidden{display:none}
.menu-header{padding:60px 60px 0;max-width:1200px;margin:0 auto;width:100%}
.menu-brand{display:flex;align-items:center;gap:10px;margin-bottom:40px}
.menu-brand .dot{width:12px;height:12px;background:var(--green);border-radius:50%}
.menu-brand span{font-size:14px;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.menu-header h1{font-size:48px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.menu-header h1 span{color:var(--green)}
.menu-header p{font-size:18px;color:var(--muted);margin-bottom:12px}
.menu-count{display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:99px;padding:6px 16px;font-size:13px;color:var(--green);font-weight:600}

.boards-grid{padding:40px 60px 80px;max-width:1200px;margin:0 auto;width:100%;display:grid;grid-template-columns:repeat(auto-fill,minmax(500px,1fr));gap:24px}

.board-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.3s;position:relative}
.board-card:hover{border-color:rgba(16,185,129,0.4);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.board-card .preview{height:200px;background:var(--surface);display:flex;gap:4px;padding:12px;overflow:hidden}
.board-card .preview img{height:100%;border-radius:6px;flex-shrink:0;opacity:0.8}
.board-card:hover .preview img{opacity:1}
.board-card .info{padding:20px 24px}
.board-card .info .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:4px 10px;border-radius:6px;margin-bottom:10px}
.board-card .info .badge.green{background:rgba(16,185,129,0.1);color:var(--green)}
.board-card .info .badge.blue{background:rgba(59,130,246,0.1);color:#3B82F6}
.board-card .info .badge.purple{background:rgba(168,85,247,0.1);color:#A855F7}
.board-card .info h3{font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.3}
.board-card .info .desc{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:12px}
.board-card .info .meta{display:flex;gap:16px;font-size:12px;color:#4B5563}
.board-card .info .meta span{display:flex;align-items:center;gap:4px}
.board-card .open-btn{position:absolute;top:16px;right:16px;background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:0;transition:opacity 0.3s;cursor:pointer}
.board-card:hover .open-btn{opacity:1}

/* === BOARD SCREEN === */
#boardScreen{width:100%;height:100%;display:none;flex-direction:column}
#boardScreen.active{display:flex}

/* Toolbar */
.toolbar{height:52px;background:rgba(17,24,39,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;z-index:1000;gap:10px;flex-shrink:0}
.toolbar .back-btn{height:36px;border:1px solid var(--border);background:transparent;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;padding:0 14px;transition:all 0.2s;display:flex;align-items:center;gap:6px;font-weight:600;font-family:inherit}
.toolbar .back-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.toolbar .board-title{font-size:14px;font-weight:600;color:var(--text);margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toolbar .sep{width:1px;height:28px;background:var(--border);flex-shrink:0}
.toolbar .nav-dots{display:flex;gap:5px}
.nav-dot{width:28px;height:5px;border-radius:3px;background:var(--border);cursor:pointer;transition:all 0.3s}
.nav-dot.active{background:var(--green);width:36px}
.nav-dot:hover{background:#374151}
.tool-group{display:flex;gap:3px;background:rgba(31,41,55,0.8);border-radius:10px;padding:3px}
.tool-btn{width:38px;height:34px;border:none;background:transparent;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;transition:all 0.2s;position:relative;font-family:inherit}
.tool-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.tool-btn.active{background:rgba(16,185,129,0.15);color:var(--green)}
.color-picker{display:flex;gap:3px;align-items:center}
.color-opt{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.2s}
.color-opt:hover,.color-opt.active{border-color:#fff;transform:scale(1.15)}
.stroke-picker{display:flex;gap:3px;align-items:center}
.stroke-opt{width:26px;height:26px;border-radius:6px;cursor:pointer;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.stroke-opt:hover,.stroke-opt.active{border-color:var(--green);background:rgba(16,185,129,0.1)}
.stroke-opt .line{background:#fff;border-radius:2px}
.clear-btn{height:34px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.08);border-radius:7px;cursor:pointer;color:#fca5a5;font-size:11px;font-weight:600;padding:0 12px;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px;font-family:inherit}
.clear-btn:hover{background:rgba(239,68,68,0.2)}
.fs-btn{height:34px;border:1px solid var(--border);background:transparent;border-radius:7px;cursor:pointer;color:var(--muted);font-size:15px;padding:0 10px;transition:all 0.2s;font-family:inherit}
.fs-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}

/* Canvas area */
.board-viewport{flex:1;overflow:hidden;position:relative}
.board-scroll{width:100%;height:100%;overflow-x:auto;overflow-y:auto;cursor:grab}
.board-scroll::-webkit-scrollbar{height:6px;width:6px}
.board-scroll::-webkit-scrollbar-track{background:transparent}
.board-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.board-scroll.grabbing{cursor:grabbing}
.board-canvas{position:relative;background:var(--bg);background-image:radial-gradient(circle,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:30px 30px}
.section-label{position:absolute;top:80px;font-size:12px;text-transform:uppercase;letter-spacing:3px;color:var(--muted);font-weight:700}
.card-frame{position:absolute;top:160px;border-radius:14px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.05);transition:transform 0.3s,box-shadow 0.3s}
.card-frame:hover{transform:translateY(-4px);box-shadow:0 16px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(16,185,129,0.15)}
.card-frame img{display:block;width:100%;height:100%}
#drawCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:500}
#drawCanvas.drawing{pointer-events:auto;cursor:crosshair}
#drawCanvas.erasing{pointer-events:auto;cursor:none}
.eraser-cursor{position:fixed;pointer-events:none;z-index:10000;border:2px solid rgba(255,255,255,0.5);border-radius:50%;display:none;transform:translate(-50%,-50%)}
.eraser-cursor.visible{display:block}
.progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border);z-index:600}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#059669);border-radius:0 2px 2px 0;transition:width 0.3s}
.minimap{position:fixed;bottom:16px;right:16px;width:220px;height:36px;background:rgba(17,24,39,0.9);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;z-index:900;display:none;align-items:center;padding:5px 7px;gap:3px}
#boardScreen.active .minimap{display:flex}
.minimap-card{height:18px;border-radius:2px;background:var(--border);flex-shrink:0;transition:background 0.3s}
.minimap-card.visible{background:var(--green)}
.hint{position:fixed;bottom:16px;left:16px;font-size:10px;color:#374151;z-index:900;display:none;gap:12px}
#boardScreen.active .hint{display:flex}
.hint kbd{background:var(--border);padding:2px 5px;border-radius:3px;font-size:9px;font-family:inherit}
.zoom-indicator{position:fixed;bottom:60px;right:16px;background:rgba(17,24,39,0.9);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--muted);z-index:900;display:none;align-items:center;gap:6px}
#boardScreen.active .zoom-indicator{display:flex}
.zoom-btn{background:none;border:1px solid var(--border);color:var(--muted);width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.zoom-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
</style>
</head>
<body>

<!-- ========== MENU SCREEN ========== -->
<div id="menuScreen">
  <div class="menu-header">
    <div class="menu-brand"><div class="dot" style="width:12px;height:12px;background:#10B981;border-radius:50%"></div><span>Rambitious Media</span></div>
    <h1>Presentation <span>Boards</span></h1>
    <p>Select a board to present. Draw on it, scroll through it, go fullscreen.</p>
    <div class="menu-count" id="boardCount"></div>
  </div>
  <div class="boards-grid" id="boardsGrid"></div>
</div>

<!-- ========== BOARD SCREEN ========== -->
<div id="boardScreen">
  <div class="toolbar">
    <button class="back-btn" onclick="goHome()">← Boards</button>
    <div class="sep"></div>
    <div class="board-title" id="boardTitle"></div>
    <div class="nav-dots" id="navDots"></div>
    <div class="sep"></div>
    <div class="tool-group">
      <button class="tool-btn active" data-tool="pan" onclick="setTool('pan')">✋</button>
      <button class="tool-btn" data-tool="pen" onclick="setTool('pen')">✏️</button>
      <button class="tool-btn" data-tool="eraser" onclick="setTool('eraser')">🧹</button>
    </div>
    <div class="sep"></div>
    <div class="color-picker" id="colorPicker">
      <div class="color-opt active" data-color="#10B981" style="background:#10B981" onclick="setColor(this)"></div>
      <div class="color-opt" data-color="#EF4444" style="background:#EF4444" onclick="setColor(this)"></div>
      <div class="color-opt" data-color="#EAB308" style="background:#EAB308" onclick="setColor(this)"></div>
      <div class="color-opt" data-color="#ffffff" style="background:#ffffff" onclick="setColor(this)"></div>
      <div class="color-opt" data-color="#3B82F6" style="background:#3B82F6" onclick="setColor(this)"></div>
    </div>
    <div class="sep"></div>
    <div class="stroke-picker">
      <div class="stroke-opt" data-width="3" onclick="setStroke(this)"><div class="line" style="width:10px;height:2px"></div></div>
      <div class="stroke-opt active" data-width="5" onclick="setStroke(this)"><div class="line" style="width:10px;height:4px"></div></div>
      <div class="stroke-opt" data-width="10" onclick="setStroke(this)"><div class="line" style="width:10px;height:7px"></div></div>
    </div>
    <div class="sep"></div>
    <button class="clear-btn" onclick="clearDrawing()">Clear</button>
    <button class="fs-btn" onclick="toggleFullscreen()">⛶</button>
  </div>
  <div class="board-viewport">
    <div class="board-scroll" id="boardScroll">
      <div class="board-canvas" id="boardCanvas">
        <canvas id="drawCanvas"></canvas>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div class="eraser-cursor" id="eraserCursor"></div>
<div class="minimap" id="minimap"></div>
<div class="zoom-indicator"><button class="zoom-btn" onclick="zoomOut()">−</button><span id="zoomLevel">100%</span><button class="zoom-btn" onclick="zoomIn()">+</button></div>
<div class="hint"><span><kbd>D</kbd> Draw</span><span><kbd>E</kbd> Eraser</span><span><kbd>V</kbd> Pan</span><span><kbd>←→</kbd> Nav</span><span><kbd>⌘Z</kbd> Undo</span></div>

<script>
// =============== BOARD REGISTRY ===============
const BOARDS = [
  {
    id: 'fb-leads-contractors',
    title: 'The Honest Truth About Facebook Leads',
    desc: 'For contractors — plain english, pain points, no marketing jargon. Hits hard on what they\'re losing by not running ads.',
    badge: 'YouTube Video',
    badgeClass: 'green',
    date: 'Apr 2026',
    folder: 'boards/fb-leads-contractors',
    cards: [
      { file: 'card-01-title.png', label: 'INTRO' },
      { file: 'card-02-objections.png', label: 'THIS IS HAPPENING NOW' },
      { file: 'card-03-speed-to-lead.png', label: 'MISTAKE #1: TOO SLOW' },
      { file: 'card-04-price-shoppers.png', label: 'MISTAKE #2: WRONG PRICE' },
      { file: 'card-05-ad-broken.png', label: 'MISTAKE #3: WRONG PERSON' },
      { file: 'card-06-wrong-setup.png', label: 'THE OPPORTUNITY' },
      { file: 'card-07-winning-campaign.png', label: 'HOW IT WORKS' },
      { file: 'card-08-price-psychology.png', label: 'THE REAL COST' },
      { file: 'card-09-lead-form.png', label: 'WHAT WINNERS DO' },
      { file: 'card-10-cta.png', label: 'NEXT STEP' },
    ]
  },
  {
    id: 'fb-leads-marketing',
    title: 'Facebook Leads — Marketing Deep Dive',
    desc: 'Technical breakdown — CPL targets, ad set structure, price psychology scale, lead form setup, campaign settings. For internal use or advanced audience.',
    badge: 'Internal / Advanced',
    badgeClass: 'blue',
    date: 'Apr 2026',
    folder: 'boards/fb-leads-marketing',
    cards: [
      { file: 'card-01-title.png', label: 'INTRO' },
      { file: 'card-02-objections.png', label: 'THE OBJECTIONS' },
      { file: 'card-03-speed-to-lead.png', label: 'REASON #1' },
      { file: 'card-04-price-shoppers.png', label: 'REASON #2' },
      { file: 'card-05-ad-broken.png', label: 'REASON #3' },
      { file: 'card-06-wrong-setup.png', label: 'REASON #4' },
      { file: 'card-07-winning-campaign.png', label: 'THE SOLUTION' },
      { file: 'card-08-price-psychology.png', label: 'PRICING' },
      { file: 'card-09-lead-form.png', label: 'LEAD FORM' },
      { file: 'card-10-cta.png', label: 'CLOSE' },
    ]
  }
];

// =============== MENU ===============
function renderMenu() {
  document.getElementById('boardCount').textContent = BOARDS.length + ' boards';
  const grid = document.getElementById('boardsGrid');
  grid.innerHTML = '';
  BOARDS.forEach(b => {
    const card = document.createElement('div');
    card.className = 'board-card';
    card.onclick = () => openBoard(b.id);
    // Preview images
    let previewHTML = '<div class="preview">';
    b.cards.slice(0, 5).forEach(c => {
      previewHTML += `<img src="${b.folder}/${c.file}" alt="${c.label}" draggable="false">`;
    });
    previewHTML += '</div>';
    card.innerHTML = previewHTML + `
      <div class="info">
        <div class="badge ${b.badgeClass}">${b.badge}</div>
        <h3>${b.title}</h3>
        <div class="desc">${b.desc}</div>
        <div class="meta"><span>🗂 ${b.cards.length} cards</span><span>📅 ${b.date}</span></div>
      </div>
      <button class="open-btn">Open Board →</button>`;
    grid.appendChild(card);
  });
}

// =============== BOARD VIEWER ===============
const CARD_W = 1200, CARD_H = 800, GAP = 120, START_X = 100;
let currentBoard = null, currentTool = 'pan', penColor = '#10B981', penWidth = 5, eraserSize = 30;
let isDrawing = false, lastX = 0, lastY = 0, undoStack = [], zoom = 1;
let isPanning = false, panStartX, panStartY, scrollStartX, scrollStartY;

function openBoard(id) {
  currentBoard = BOARDS.find(b => b.id === id);
  if (!currentBoard) return;
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('boardScreen').classList.add('active');
  document.getElementById('boardTitle').textContent = currentBoard.title;
  buildBoard();
  setTool('pan');
  history.pushState({ board: id }, '', '#' + id);
}

function goHome() {
  document.getElementById('boardScreen').classList.remove('active');
  document.getElementById('menuScreen').classList.remove('hidden');
  clearBoard();
  history.pushState({}, '', window.location.pathname);
}

function clearBoard() {
  document.getElementById('boardCanvas').innerHTML = '<canvas id="drawCanvas"></canvas>';
  document.getElementById('navDots').innerHTML = '';
  document.getElementById('minimap').innerHTML = '';
  undoStack = [];
  zoom = 1;
}

function buildBoard() {
  clearBoard();
  const canvas = document.getElementById('boardCanvas');
  const cards = currentBoard.cards;
  const totalW = START_X * 2 + cards.length * (CARD_W + GAP);
  canvas.style.width = totalW + 'px';
  canvas.style.height = '1400px';

  const dc = document.getElementById('drawCanvas');
  dc.width = totalW; dc.height = 1400;
  dc.style.width = totalW + 'px'; dc.style.height = '1400px';

  cards.forEach((card, i) => {
    const x = START_X + i * (CARD_W + GAP);
    const label = document.createElement('div');
    label.className = 'section-label';
    label.style.left = x + 'px';
    label.textContent = card.label;
    canvas.appendChild(label);

    const frame = document.createElement('div');
    frame.className = 'card-frame';
    frame.style.left = x + 'px';
    frame.style.width = CARD_W + 'px';
    frame.style.height = CARD_H + 'px';
    const img = document.createElement('img');
    img.src = currentBoard.folder + '/' + card.file;
    img.alt = card.label;
    img.draggable = false;
    frame.appendChild(img);
    canvas.appendChild(frame);
  });

  // Nav dots
  const dotsEl = document.getElementById('navDots');
  cards.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => scrollToCard(i);
    dotsEl.appendChild(dot);
  });

  // Minimap
  const minimap = document.getElementById('minimap');
  cards.forEach(() => {
    const mc = document.createElement('div');
    mc.className = 'minimap-card';
    mc.style.width = (200 / cards.length - 3) + 'px';
    minimap.appendChild(mc);
  });

  setupDrawing();
  updateNav();
}

function scrollToCard(i) {
  const scrollEl = document.getElementById('boardScroll');
  const x = START_X + i * (CARD_W + GAP) - 60;
  scrollEl.scrollTo({ left: x * zoom, behavior: 'smooth' });
}

function updateNav() {
  if (!currentBoard) return;
  const scrollEl = document.getElementById('boardScroll');
  const canvas = document.getElementById('boardCanvas');
  const scrollX = scrollEl.scrollLeft / zoom;
  const viewW = scrollEl.clientWidth / zoom;
  const totalW = parseInt(canvas.style.width);
  const progress = Math.min(scrollX / Math.max(totalW - viewW, 1) * 100, 100);
  document.getElementById('progressFill').style.width = Math.max(progress, 2) + '%';
  const dots = document.querySelectorAll('.nav-dot');
  const mmCards = document.querySelectorAll('.minimap-card');
  currentBoard.cards.forEach((_, i) => {
    const cardX = START_X + i * (CARD_W + GAP);
    const vis = cardX + CARD_W > scrollX && cardX < scrollX + viewW;
    if (dots[i]) dots[i].classList.toggle('active', vis);
    if (mmCards[i]) mmCards[i].classList.toggle('visible', vis);
  });
}

// =============== TOOLS ===============
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  const dc = document.getElementById('drawCanvas');
  dc.className = tool === 'pen' ? 'drawing' : tool === 'eraser' ? 'erasing' : '';
  const ec = document.getElementById('eraserCursor');
  ec.classList.toggle('visible', tool === 'eraser');
  if (tool === 'eraser') { ec.style.width = eraserSize + 'px'; ec.style.height = eraserSize + 'px'; }
  document.getElementById('boardScroll').style.cursor = tool === 'pan' ? 'grab' : 'default';
}
function setColor(el) {
  penColor = el.dataset.color;
  document.querySelectorAll('.color-opt').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}
function setStroke(el) {
  penWidth = parseInt(el.dataset.width);
  document.querySelectorAll('.stroke-opt').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}
function clearDrawing() {
  const dc = document.getElementById('drawCanvas');
  const ctx = dc.getContext('2d');
  undoStack.push(ctx.getImageData(0, 0, dc.width, dc.height));
  ctx.clearRect(0, 0, dc.width, dc.height);
}

// =============== DRAWING ===============
function setupDrawing() {
  const dc = document.getElementById('drawCanvas');
  const ctx = dc.getContext('2d');
  function getPos(e) {
    const r = dc.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (dc.width / r.width), y: (e.clientY - r.top) * (dc.height / r.height) };
  }
  dc.onmousedown = e => {
    if (currentTool === 'pan') return;
    isDrawing = true;
    undoStack.push(ctx.getImageData(0, 0, dc.width, dc.height));
    if (undoStack.length > 50) undoStack.shift();
    const p = getPos(e); lastX = p.x; lastY = p.y;
    if (currentTool === 'pen') { ctx.beginPath(); ctx.arc(p.x, p.y, penWidth / 2, 0, Math.PI * 2); ctx.fillStyle = penColor; ctx.fill(); }
  };
  dc.onmousemove = e => {
    if (currentTool === 'eraser') { const ec = document.getElementById('eraserCursor'); ec.style.left = e.clientX + 'px'; ec.style.top = e.clientY + 'px'; }
    if (!isDrawing) return;
    const p = getPos(e);
    if (currentTool === 'pen') { ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y); ctx.strokeStyle = penColor; ctx.lineWidth = penWidth; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke(); }
    else if (currentTool === 'eraser') { ctx.save(); ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(p.x, p.y, eraserSize, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    lastX = p.x; lastY = p.y;
  };
  dc.onmouseup = dc.onmouseleave = () => isDrawing = false;
}

// =============== PAN ===============
document.addEventListener('mousedown', e => {
  const scrollEl = document.getElementById('boardScroll');
  if (currentTool !== 'pan' || !scrollEl.contains(e.target) || e.target.closest('canvas')) return;
  isPanning = true; panStartX = e.clientX; panStartY = e.clientY;
  scrollStartX = scrollEl.scrollLeft; scrollStartY = scrollEl.scrollTop;
  scrollEl.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!isPanning) return;
  const scrollEl = document.getElementById('boardScroll');
  scrollEl.scrollLeft = scrollStartX - (e.clientX - panStartX);
  scrollEl.scrollTop = scrollStartY - (e.clientY - panStartY);
});
window.addEventListener('mouseup', () => { isPanning = false; const s = document.getElementById('boardScroll'); if (s) s.classList.remove('grabbing'); });

// =============== ZOOM ===============
function setZoom(z) {
  zoom = Math.max(0.25, Math.min(2, z));
  const c = document.getElementById('boardCanvas');
  c.style.transform = `scale(${zoom})`; c.style.transformOrigin = 'top left';
  document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
  updateNav();
}
function zoomIn() { setZoom(zoom + 0.1); }
function zoomOut() { setZoom(zoom - 0.1); }
document.getElementById('boardScroll').addEventListener('wheel', e => { if (e.ctrlKey || e.metaKey) { e.preventDefault(); setZoom(zoom - e.deltaY * 0.002); } }, { passive: false });
document.getElementById('boardScroll').addEventListener('scroll', updateNav);

// =============== KEYS ===============
document.addEventListener('keydown', e => {
  if (!currentBoard) return;
  if (e.key === 'd' || e.key === 'D') setTool('pen');
  else if (e.key === 'e' || e.key === 'E') setTool('eraser');
  else if (e.key === 'v' || e.key === 'V') setTool('pan');
  else if (e.key === 'Escape') goHome();
  else if (e.key === 'ArrowRight') { const c = Math.floor(document.getElementById('boardScroll').scrollLeft / zoom / (CARD_W + GAP)); scrollToCard(Math.min(c + 1, currentBoard.cards.length - 1)); }
  else if (e.key === 'ArrowLeft') { const c = Math.floor(document.getElementById('boardScroll').scrollLeft / zoom / (CARD_W + GAP)); scrollToCard(Math.max(c - 1, 0)); }
  else if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); const dc = document.getElementById('drawCanvas'); if (undoStack.length) dc.getContext('2d').putImageData(undoStack.pop(), 0, 0); }
  else if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
  else if (e.key === '-') { e.preventDefault(); zoomOut(); }
  else if (e.key === '0') { e.preventDefault(); setZoom(1); }
});

function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

// =============== ROUTING ===============
function handleHash() {
  const hash = window.location.hash.slice(1);
  if (hash && BOARDS.find(b => b.id === hash)) openBoard(hash);
  else { document.getElementById('boardScreen').classList.remove('active'); document.getElementById('menuScreen').classList.remove('hidden'); }
}
window.addEventListener('popstate', handleHash);

// =============== INIT ===============
renderMenu();
handleHash();
</script>
</body>
