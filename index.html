<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Honest Truth About Facebook Leads — Rambitious Media</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--surface:#111827;--border:#1f2937;--green:#10B981;--red:#EF4444;--text:#f9fafb;--muted:#6b7280}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--text);user-select:none;-webkit-user-select:none}

/* === TOOLBAR === */
.toolbar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(17,24,39,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;z-index:1000;gap:12px}
.toolbar .brand{display:flex;align-items:center;gap:8px;margin-right:auto}
.toolbar .brand .dot{width:10px;height:10px;background:var(--green);border-radius:50%}
.toolbar .brand span{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.toolbar .sep{width:1px;height:28px;background:var(--border)}
.toolbar .nav-dots{display:flex;gap:6px;margin-right:auto}
.nav-dot{width:32px;height:6px;border-radius:3px;background:var(--border);cursor:pointer;transition:all 0.3s}
.nav-dot.active{background:var(--green);width:40px}
.nav-dot:hover{background:#374151}

/* Tool buttons */
.tool-group{display:flex;gap:4px;background:rgba(31,41,55,0.8);border-radius:10px;padding:4px}
.tool-btn{width:40px;height:36px;border:none;background:transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;transition:all 0.2s;position:relative}
.tool-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.tool-btn.active{background:rgba(16,185,129,0.15);color:var(--green)}
.tool-btn .tooltip{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1f2937;color:#d1d5db;font-size:11px;padding:4px 10px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.2s}
.tool-btn:hover .tooltip{opacity:1}

/* Color picker */
.color-picker{display:flex;gap:4px;align-items:center}
.color-opt{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.2s}
.color-opt:hover,.color-opt.active{border-color:#fff;transform:scale(1.15)}
.color-opt.c-green{background:#10B981}
.color-opt.c-red{background:#EF4444}
.color-opt.c-yellow{background:#EAB308}
.color-opt.c-white{background:#ffffff}
.color-opt.c-blue{background:#3B82F6}

/* Stroke width */
.stroke-picker{display:flex;gap:4px;align-items:center}
.stroke-opt{width:28px;height:28px;border-radius:6px;cursor:pointer;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.stroke-opt:hover,.stroke-opt.active{border-color:var(--green);background:rgba(16,185,129,0.1)}
.stroke-opt .line{background:#fff;border-radius:2px}

/* Clear button */
.clear-btn{height:36px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.08);border-radius:8px;cursor:pointer;color:#fca5a5;font-size:12px;font-weight:600;padding:0 14px;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.5px}
.clear-btn:hover{background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5)}

/* Fullscreen btn */
.fs-btn{height:36px;border:1px solid var(--border);background:transparent;border-radius:8px;cursor:pointer;color:var(--muted);font-size:16px;padding:0 12px;transition:all 0.2s}
.fs-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}

/* === CANVAS AREA === */
.board-viewport{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden}

/* Scrollable board */
.board-scroll{width:100%;height:100%;overflow-x:auto;overflow-y:auto;cursor:grab;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.board-scroll::-webkit-scrollbar{height:8px;width:8px}
.board-scroll::-webkit-scrollbar-track{background:transparent}
.board-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.board-scroll.grabbing{cursor:grabbing}

/* Board canvas */
.board-canvas{position:relative;width:14400px;height:1800px;background:var(--bg);background-image:radial-gradient(circle,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:30px 30px}

/* Section labels */
.section-label{position:absolute;top:80px;font-size:13px;text-transform:uppercase;letter-spacing:3px;color:var(--muted);font-weight:700}

/* Card containers */
.card-frame{position:absolute;top:160px;border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.05);transition:transform 0.3s,box-shadow 0.3s}
.card-frame:hover{transform:translateY(-4px);box-shadow:0 16px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(16,185,129,0.15)}
.card-frame img{display:block;width:100%;height:100%}

/* Drawing canvas overlay */
#drawCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:500}
#drawCanvas.drawing{pointer-events:auto;cursor:crosshair}
#drawCanvas.erasing{pointer-events:auto;cursor:none}

/* Custom eraser cursor */
.eraser-cursor{position:fixed;pointer-events:none;z-index:10000;border:2px solid rgba(255,255,255,0.5);border-radius:50%;display:none;transform:translate(-50%,-50%)}
.eraser-cursor.visible{display:block}

/* Bottom progress bar */
.progress-bar{position:fixed;bottom:0;left:0;right:0;height:4px;background:var(--border);z-index:1000}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#059669);border-radius:0 2px 2px 0;transition:width 0.3s}

/* Mini map */
.minimap{position:fixed;bottom:20px;right:20px;width:240px;height:40px;background:rgba(17,24,39,0.9);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;z-index:900;display:flex;align-items:center;padding:6px 8px;gap:3px}
.minimap-card{height:20px;border-radius:3px;background:var(--border);flex-shrink:0;transition:background 0.3s}
.minimap-card.visible{background:var(--green)}

/* Keyboard hint */
.hint{position:fixed;bottom:20px;left:20px;font-size:11px;color:var(--muted);z-index:900;display:flex;gap:16px}
.hint kbd{background:var(--border);padding:2px 6px;border-radius:4px;font-size:10px;font-family:inherit}

/* Zoom indicator */
.zoom-indicator{position:fixed;bottom:72px;right:20px;background:rgba(17,24,39,0.9);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--muted);z-index:900;display:flex;align-items:center;gap:8px}
.zoom-btn{background:none;border:1px solid var(--border);color:var(--muted);width:24px;height:24px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <div class="brand"><div class="dot"></div><span>Rambitious Media</span></div>
  <div class="nav-dots" id="navDots"></div>
  <div class="sep"></div>
  <div class="tool-group">
    <button class="tool-btn active" data-tool="pan" onclick="setTool('pan')">✋<span class="tooltip">Pan (V)</span></button>
    <button class="tool-btn" data-tool="pen" onclick="setTool('pen')">✏️<span class="tooltip">Draw (D)</span></button>
    <button class="tool-btn" data-tool="eraser" onclick="setTool('eraser')">🧹<span class="tooltip">Eraser (E)</span></button>
  </div>
  <div class="sep"></div>
  <div class="color-picker" id="colorPicker">
    <div class="color-opt c-green active" data-color="#10B981" onclick="setColor(this)"></div>
    <div class="color-opt c-red" data-color="#EF4444" onclick="setColor(this)"></div>
    <div class="color-opt c-yellow" data-color="#EAB308" onclick="setColor(this)"></div>
    <div class="color-opt c-white" data-color="#ffffff" onclick="setColor(this)"></div>
    <div class="color-opt c-blue" data-color="#3B82F6" onclick="setColor(this)"></div>
  </div>
  <div class="sep"></div>
  <div class="stroke-picker">
    <div class="stroke-opt" data-width="3" onclick="setStroke(this)"><div class="line" style="width:12px;height:2px"></div></div>
    <div class="stroke-opt active" data-width="5" onclick="setStroke(this)"><div class="line" style="width:12px;height:4px"></div></div>
    <div class="stroke-opt" data-width="10" onclick="setStroke(this)"><div class="line" style="width:12px;height:7px"></div></div>
  </div>
  <div class="sep"></div>
  <button class="clear-btn" onclick="clearDrawing()">Clear All</button>
  <button class="fs-btn" onclick="toggleFullscreen()">⛶</button>
</div>

<!-- Board -->
<div class="board-viewport">
  <div class="board-scroll" id="boardScroll">
    <div class="board-canvas" id="boardCanvas">
      <canvas id="drawCanvas"></canvas>
    </div>
  </div>
</div>

<!-- Eraser cursor -->
<div class="eraser-cursor" id="eraserCursor"></div>

<!-- Progress bar -->
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<!-- Minimap -->
<div class="minimap" id="minimap"></div>

<!-- Zoom -->
<div class="zoom-indicator">
  <button class="zoom-btn" onclick="zoomOut()">−</button>
  <span id="zoomLevel">100%</span>
  <button class="zoom-btn" onclick="zoomIn()">+</button>
</div>

<!-- Keyboard hints -->
<div class="hint">
  <span><kbd>D</kbd> Draw</span>
  <span><kbd>E</kbd> Eraser</span>
  <span><kbd>V</kbd> Pan</span>
  <span><kbd>←→</kbd> Navigate</span>
  <span><kbd>Ctrl+Z</kbd> Undo</span>
</div>

<script>
// === CARD DATA ===
const cards = [
  { id: 1, file: 'images/card-01-title.png', label: 'INTRO', section: 'intro' },
  { id: 2, file: 'images/card-02-objections.png', label: 'THE OBJECTIONS', section: 'problem' },
  { id: 3, file: 'images/card-03-speed-to-lead.png', label: 'REASON #1', section: 'reasons' },
  { id: 4, file: 'images/card-04-price-shoppers.png', label: 'REASON #2', section: 'reasons' },
  { id: 5, file: 'images/card-05-ad-broken.png', label: 'REASON #3', section: 'reasons' },
  { id: 6, file: 'images/card-06-wrong-setup.png', label: 'REASON #4', section: 'reasons' },
  { id: 7, file: 'images/card-07-winning-campaign.png', label: 'THE SOLUTION', section: 'solution' },
  { id: 8, file: 'images/card-08-price-psychology.png', label: 'PRICING', section: 'solution' },
  { id: 9, file: 'images/card-09-lead-form.png', label: 'LEAD FORM', section: 'solution' },
  { id: 10, file: 'images/card-10-cta.png', label: 'CLOSE', section: 'close' },
];

const CARD_W = 1200;
const CARD_H = 800;
const GAP = 120;
const START_X = 100;
const canvas = document.getElementById('boardCanvas');
const drawCanvas = document.getElementById('drawCanvas');
const ctx = drawCanvas.getContext('2d');
const scrollEl = document.getElementById('boardScroll');
const eraserCursor = document.getElementById('eraserCursor');

let currentTool = 'pan';
let penColor = '#10B981';
let penWidth = 5;
let eraserSize = 30;
let isDrawing = false;
let lastX = 0, lastY = 0;
let undoStack = [];
let zoom = 1;

// === BUILD BOARD ===
function buildBoard() {
  cards.forEach((card, i) => {
    const x = START_X + i * (CARD_W + GAP);
    
    // Section label
    const label = document.createElement('div');
    label.className = 'section-label';
    label.style.left = x + 'px';
    label.textContent = card.label;
    canvas.appendChild(label);
    
    // Card frame
    const frame = document.createElement('div');
    frame.className = 'card-frame';
    frame.style.left = x + 'px';
    frame.style.width = CARD_W + 'px';
    frame.style.height = CARD_H + 'px';
    frame.dataset.index = i;
    
    const img = document.createElement('img');
    img.src = card.file;
    img.alt = card.label;
    img.draggable = false;
    frame.appendChild(img);
    canvas.appendChild(frame);
  });
  
  // Size the canvas properly
  const totalW = START_X * 2 + cards.length * (CARD_W + GAP);
  canvas.style.width = totalW + 'px';
  drawCanvas.width = totalW;
  drawCanvas.height = 1800;
  drawCanvas.style.width = totalW + 'px';
  drawCanvas.style.height = '1800px';
  
  // Nav dots
  const dotsEl = document.getElementById('navDots');
  cards.forEach((card, i) => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => scrollToCard(i);
    dotsEl.appendChild(dot);
  });
  
  // Minimap
  const minimap = document.getElementById('minimap');
  cards.forEach((_, i) => {
    const mc = document.createElement('div');
    mc.className = 'minimap-card';
    mc.style.width = (220 / cards.length - 3) + 'px';
    minimap.appendChild(mc);
  });
}

// === NAVIGATION ===
function scrollToCard(i) {
  const x = START_X + i * (CARD_W + GAP) - 60;
  scrollEl.scrollTo({ left: x * zoom, behavior: 'smooth' });
}

function updateNav() {
  const scrollX = scrollEl.scrollLeft / zoom;
  const viewW = scrollEl.clientWidth / zoom;
  const totalW = parseInt(canvas.style.width);
  
  // Progress bar
  const progress = Math.min(scrollX / (totalW - viewW) * 100, 100);
  document.getElementById('progressFill').style.width = Math.max(progress, 2) + '%';
  
  // Nav dots + minimap
  const dots = document.querySelectorAll('.nav-dot');
  const mmCards = document.querySelectorAll('.minimap-card');
  cards.forEach((_, i) => {
    const cardX = START_X + i * (CARD_W + GAP);
    const visible = cardX + CARD_W > scrollX && cardX < scrollX + viewW;
    dots[i].classList.toggle('active', visible);
    mmCards[i].classList.toggle('visible', visible);
  });
}

scrollEl.addEventListener('scroll', updateNav);

// === TOOLS ===
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  drawCanvas.className = tool === 'pen' ? 'drawing' : tool === 'eraser' ? 'erasing' : '';
  eraserCursor.classList.toggle('visible', tool === 'eraser');
  if (tool === 'eraser') {
    eraserCursor.style.width = eraserSize + 'px';
    eraserCursor.style.height = eraserSize + 'px';
  }
  // Toggle scroll grab cursor
  if (tool === 'pan') {
    scrollEl.style.cursor = 'grab';
  } else {
    scrollEl.style.cursor = 'default';
  }
}

function setColor(el) {
  penColor = el.dataset.color;
  document.querySelectorAll('.color-opt').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function setStroke(el) {
  penWidth = parseInt(el.dataset.width);
  document.querySelectorAll('.stroke-opt').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}

// === DRAWING ===
function saveUndo() {
  undoStack.push(ctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
  if (undoStack.length > 50) undoStack.shift();
}

function getCanvasPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

drawCanvas.addEventListener('mousedown', (e) => {
  if (currentTool === 'pan') return;
  isDrawing = true;
  saveUndo();
  const pos = getCanvasPos(e);
  lastX = pos.x;
  lastY = pos.y;
  
  if (currentTool === 'pen') {
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, penWidth / 2, 0, Math.PI * 2);
    ctx.fillStyle = penColor;
    ctx.fill();
  }
});

drawCanvas.addEventListener('mousemove', (e) => {
  // Update eraser cursor
  if (currentTool === 'eraser') {
    eraserCursor.style.left = e.clientX + 'px';
    eraserCursor.style.top = e.clientY + 'px';
  }
  
  if (!isDrawing) return;
  const pos = getCanvasPos(e);
  
  if (currentTool === 'pen') {
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = penColor;
    ctx.lineWidth = penWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  } else if (currentTool === 'eraser') {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, eraserSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  
  lastX = pos.x;
  lastY = pos.y;
});

drawCanvas.addEventListener('mouseup', () => isDrawing = false);
drawCanvas.addEventListener('mouseleave', () => isDrawing = false);

function clearDrawing() {
  saveUndo();
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

// === PAN (drag to scroll) ===
let isPanning = false, panStartX, panStartY, scrollStartX, scrollStartY;

scrollEl.addEventListener('mousedown', (e) => {
  if (currentTool !== 'pan') return;
  isPanning = true;
  panStartX = e.clientX;
  panStartY = e.clientY;
  scrollStartX = scrollEl.scrollLeft;
  scrollStartY = scrollEl.scrollTop;
  scrollEl.classList.add('grabbing');
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  scrollEl.scrollLeft = scrollStartX - (e.clientX - panStartX);
  scrollEl.scrollTop = scrollStartY - (e.clientY - panStartY);
});

window.addEventListener('mouseup', () => {
  isPanning = false;
  scrollEl.classList.remove('grabbing');
});

// === ZOOM ===
function setZoom(z) {
  zoom = Math.max(0.25, Math.min(2, z));
  canvas.style.transform = `scale(${zoom})`;
  canvas.style.transformOrigin = 'top left';
  document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
  updateNav();
}

function zoomIn() { setZoom(zoom + 0.1); }
function zoomOut() { setZoom(zoom - 0.1); }

scrollEl.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    setZoom(zoom - e.deltaY * 0.002);
  }
}, { passive: false });

// === KEYBOARD SHORTCUTS ===
document.addEventListener('keydown', (e) => {
  if (e.key === 'd' || e.key === 'D') setTool('pen');
  else if (e.key === 'e' || e.key === 'E') setTool('eraser');
  else if (e.key === 'v' || e.key === 'V') setTool('pan');
  else if (e.key === 'ArrowRight') {
    const current = Math.floor(scrollEl.scrollLeft / zoom / (CARD_W + GAP));
    scrollToCard(Math.min(current + 1, cards.length - 1));
  }
  else if (e.key === 'ArrowLeft') {
    const current = Math.floor(scrollEl.scrollLeft / zoom / (CARD_W + GAP));
    scrollToCard(Math.max(current - 1, 0));
  }
  else if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    if (undoStack.length) ctx.putImageData(undoStack.pop(), 0, 0);
  }
  else if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
  else if (e.key === '-') { e.preventDefault(); zoomOut(); }
  else if (e.key === '0') { e.preventDefault(); setZoom(1); }
});

// === FULLSCREEN ===
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

// === INIT ===
buildBoard();
updateNav();
setTool('pan');
</script>
</body>
</html>
