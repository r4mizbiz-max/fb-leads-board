<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:800px;background:#111827;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;overflow:hidden;position:relative;text-align:center;padding:64px}
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:820px;height:520px;background:radial-gradient(ellipse,rgba(59,130,246,0.09),transparent 70%);pointer-events:none}
.corner-tl,.corner-br{position:absolute;width:60px;height:60px;border:2px solid rgba(59,130,246,0.15)}
.corner-tl{top:24px;left:24px;border-right:0;border-bottom:0;border-radius:4px 0 0 0}
.corner-br{bottom:24px;right:24px;border-left:0;border-top:0;border-radius:0 0 4px 0}
.tag{font-size:13px;text-transform:uppercase;letter-spacing:3px;color:#93C5FD;font-weight:700;margin-bottom:26px;position:relative}
.lens{font-size:44px;margin-bottom:22px;position:relative}
h2{font-size:44px;font-weight:800;line-height:1.22;max-width:920px;margin-bottom:26px;position:relative;letter-spacing:-0.5px}
h2 span{color:#3B82F6}
.answer{position:relative;background:rgba(59,130,246,0.07);border:1px solid rgba(59,130,246,0.22);border-radius:14px;padding:20px 30px;max-width:760px;font-size:19px;color:#D1D5DB;line-height:1.5}
.answer b{color:#93C5FD}
.brand{position:absolute;bottom:32px;right:40px;display:flex;align-items:center;gap:10px}
.brand .dot{width:12px;height:12px;background:#10B981;border-radius:50%}
.brand span{font-size:16px;font-weight:600;color:#6B7280;letter-spacing:1px;text-transform:uppercase}
.brand-left{position:absolute;bottom:36px;left:40px;font-size:12px;color:#4B5563;letter-spacing:1px;text-transform:uppercase}
</style></head><body>
<div class="glow"></div>
<div class="corner-tl"></div>
<div class="corner-br"></div>
<div class="tag">Before You Launch Your Next Campaign</div>
<div class="lens">🔍</div>
<h2>"If I knew nothing about my company — and only read this ad — <span>what kind of homeowner</span> would I think it's for?"</h2>
<div class="answer">Because that's <b>exactly</b> the homeowner Facebook is about to go find for you.</div>
<div class="brand-left">Vol. 05 · YouTube 2026</div>
<div class="brand"><div class="dot"></div><span>Rambitious Media</span></div>
</body></html>
